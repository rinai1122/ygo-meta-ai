name: Update Card Database

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Update ygo-agent submodule to latest
        run: |
          git submodule update --remote vendor/ygo-agent
          echo "ygo-agent submodule SHA: $(git -C vendor/ygo-agent rev-parse HEAD)"

      - name: Rebuild card database from YGOPRODeck API
        run: python scripts/build_card_db.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/card_names.json data/card_info.json vendor/ygo-agent && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if updated
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage submodule pointer + card databases
          git add vendor/ygo-agent data/card_names.json data/card_info.json

          CARD_COUNT=$(python -c "import json; d=json.load(open('data/card_names.json')); print(len(d))")
          YGO_SHA=$(git -C vendor/ygo-agent rev-parse --short HEAD)

          git commit -m "chore: weekly card database update

          - card_names.json: ${CARD_COUNT} cards (fetched from YGOPRODeck API)
          - vendor/ygo-agent pinned to ${YGO_SHA}

          [skip ci]"

          git push
